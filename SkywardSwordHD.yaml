name: Player1
description: Default Skyward Sword HD Archipelago Template

game: Skyward Sword HD
requires:
  version: 0.6.6 # Version of Archipelago required for this yaml to work as expected.
  game:
    Skyward Sword HD: 0.7.0

Skyward Sword HD:

  # ALL REQUIRED SETTINGS
  #  - PATH TO EXTRACTED SSHD ROM FILES
  #  - One of the three configuration methods (config.yaml, setting string, or manual settings)
  # ALL RECOMMENDED SETTINGS
  #  - Archipelago Options
  #    - Death Link
  #    - Progression Balancing
  #    - Breath Link
  # OPTIONAL SETTINGS
  #  - Cheats
  #    - Infinite Health
  #    - Infinite Stamina
  #    - Infinite Arrows/Bombs/Seeds
  #    - Infinite Bugs
  #    - Infinite Materials
  #    - Infinite Shield Durability
  #    - Infinite Skyward Strike Time
  #    - Infinite Rupees
  #    - Moon Jump
  #    - Infinite Beetle Flying Time
  #    - Infinite Loftwing Charges
  #    - Speed Multiplier



  # ========================================
  # PATH TO EXTRACTED ROM FILES
  # ========================================
  
  # Path to extracted SSHD ROM (must contain romfs/ and exefs/ folders)
  # On Windows: C:\\ProgramData\\Archipelago\\sshd_extract
  # On Linux: /home/user/.local/share/Archipelago/sshd_extract
  # On macOS: /Users/user/Library/Application Support/Archipelago/sshd_extract
  extract_path: ""



  # ====================================================================================



  # ========================================
  # ARCHIPELAGO OPTIONS
  # ========================================
  
  # Death Link: When you die, everyone dies (and vice versa)
  death_link: false
  
  # Breath Link: When your stamina runs out, everyone's stamina runs out (and vice versa)
  breath_link: false


  # Progression Balancing
  # Controls how much to front-load progression items to reduce waiting in multiworld
  # 0: Completely random placement (no balancing)
  # 25: Slight bias toward early game
  # 50: Balanced placement (recommended for multiworld)
  # 75: Strong bias toward early game
  # 99: Maximum early placement
  # Higher values help prevent players from waiting on others for key items
  progression_balancing: 50


  # Use Alternative Logo
  # false: The default Archipelago logo will be used on the title screen and credits (default)
  # true: The alternative Archipelago logo will be used on the title screen and credits (adds the archipelago triangle things at the top)
  use_alternative_logo: false



  # ========================================
  # CHEATS
  # ========================================
  # These cheats are applied in real-time by the client via memory writes.
  # They do NOT affect randomizer logic or seed generation.

  # Infinite Health
  # When enabled, the randomizer's damage multiplier is forced to 0 (no damage).
  # Your health will never decrease from enemy attacks or hazards.
  cheat_infinite_health: false

  # Infinite Stamina
  # When enabled, your stamina gauge is kept full at all times.
  # You will never run out of stamina while sprinting, climbing, or spin-attacking.
  cheat_infinite_stamina: false

  # Infinite Arrows/Bombs/Seeds
  # When enabled, your Arrow, Bomb, and Deku Seed counters are kept at max.
  # You will never run out of ammunition.
  cheat_infinite_ammo: false

  # Infinite Bugs
  # When enabled, the randomizer's "Start with All Bugs" setting is forced on,
  # giving you 99 of every bug from the start. The client also keeps your
  # bug-ownership flags set each tick so they are never lost.
  cheat_infinite_bugs: false

  # Infinite Materials (Treasures)
  # When enabled, the randomizer's "Start with All Treasures" setting is forced on,
  # giving you 99 of every treasure/material from the start. The client also keeps
  # your treasure-ownership flags set each tick so they are never lost.
  cheat_infinite_materials: false

  # Infinite Shield Durability
  # When enabled, your equipped shield will never lose durability or break.
  # (Shield durability counter is kept at max.)
  cheat_infinite_shield: false

  # Infinite Skyward Strike Time
  # When enabled, the Skyward Strike charge timer never expires.
  # Once charged, your sword stays charged indefinitely.
  cheat_infinite_skyward_strike: false

  # Infinite Rupees
  # When enabled, your rupee counter is kept at the maximum for your wallet.
  # You will always have enough rupees for any purchase.
  cheat_infinite_rupees: false

  # Moon Jump
  # When enabled, pressing Y while airborne gives a large upward velocity boost.
  # Hold Y to fly upward freely.
  cheat_moon_jump: false

  # Infinite Beetle Flying Time
  # When enabled, the Beetle's flight timer is set to a very large value.
  # The Beetle will fly indefinitely without returning automatically.
  # NOTE: This patches game code
  cheat_infinite_beetle: false

  # Infinite Loftwing Charges
  # When enabled, the Loftwing's spiral charge counter stays at 3.
  # You can perform unlimited spiral charges while flying.
  cheat_infinite_loftwing: false

  # Speed Multiplier
  # Multiplies Link's forward movement speed.
  # 10 = normal (1.0x), 20 = double (2.0x), 30 = triple (3.0x), etc.
  # Range: 10 to 50 (values above 30 may cause collision issues)
  cheat_speed_multiplier: 10



  # ====================================================================================



  # YOU HAVE THREE OPTIONS TO CONFIGURE YOUR RANDOMIZER SETTINGS:


  # ========================================
  # CONFIGURATION METHOD ONE: USING config.yaml
  # This is the recommended method. It is the most user-friendly and will be compatible with all versions of the randomizer.
  # ========================================
  # Configure all of your settings in the vanilla Skyward Sword HD Randomizer application (only change the settings, do not generate).
  # When you're done, there should be a config.yaml file in the randomizer folder. Copy its path into the field below and the settings will be imported from that file.
  # Example: C:\\Users\\awesome_user\\Downloads\\Skyward_Sword_HD_Randomizer_v2.2_windows\\config.yaml
  config_yaml_path: ""



  # ====================================================================================



  # ========================================
  # CONFIGURATION METHOD TWO: SETTING STRING
  # NOT CURRENTLY WORKING RELIABLY ENOUGH - USE METHOD ONE OR THREE INSTEAD FOR NOW
  # ========================================
  # Leave setting_string BLANK to use manual configuration below
  # Manual configuration gives you full control and avoids item mapping issues
  setting_string: ""
    
  # Seed (e.g., "AirStrongholdPlantSkipper")
  # Leave blank for random seed
  sshdr_seed: ""



  # ====================================================================================



  # ========================================
  # CONFIGURATION METHOD THREE: MANUAL SETTINGS
  # ========================================
  
  
  # ========================================
  # CORE LOGIC SETTINGS
  # ========================================
  
  # Logic Rules
  # all_locations_reachable: Logic is considered when placing items. Tricks and Glitches can be enabled for consideration below.
  # beatable_only: Only ensures the game is beatable. Some locations may be unreachable, and items required to reach those locations will not be placed at them.
  logic_rules: all_locations_reachable
  
  # Item Pool Size
  # minimal: No item upgrades will be shuffled into the item pool. There will only be 2 Beetles, 1 Bow, 1 Slingshot, and 1 Bug Net in the item pool.
  # standard: Balanced default item pool
  # extra: Extra items added for more variety
  # plentiful: The standard item pool will be used plus 100% extra of the major items. E.g. There will be 8 Beetles, 6 Bows, 4 Mitts, etc...
  item_pool: standard
  
  # Progressive Items
  # true: Items with multiple tiers (Sword, Beetle, Bow, Slingshot, Bug Net, Mitts, Pouches, Wallets) will automatically upgrade to the next tier when collected
  # false: Each tier is a separate item (e.g., you could find Tough Beetle before normal Beetle)
  progressive_items: true
  
  # ========================================
  # COMPLETION REQUIREMENTS
  # ========================================
  
  # Number of dungeons required to complete the game (0-6)
  # Beating Sky Keep is NOT required for this count
  # Lanayru Mining Facility is beaten when exiting to the Temple of Time
  # Other dungeons are beaten when the Goddess Crest is struck with a Skyward Strike
  required_dungeon_count: 2
  
  # Sword requirement to open the Gate of Time
  # Options: goddess_sword, goddess_longsword, goddess_white_sword, master_sword, true_master_sword
  gate_of_time_sword_requirement: true_master_sword
  
  # Skip boss encounters at the end
  skip_horde: false        # Skip The Horde fight
  skip_ghirahim3: true    # Skip Ghirahim 3 fight
  
  # ========================================
  # ITEM RANDOMIZATION
  # ========================================
  
  # Toggle item category shuffling
  gratitude_crystal_shuffle: false      # Single Gratitude Crystals can contain any item (false = only crystals)
  stamina_fruit_shuffle: false          # Stamina Fruit locations can contain any item (false = only stamina fruit, locations revert after collection)
  npc_closet_shuffle: false             # Randomized NPC closets (false = vanilla items)
  hidden_item_shuffle: false            # Hidden Item checks can contain any item first time (false = always vanilla items)
  goddess_chest_shuffle: false          # Goddess Chest items can be randomized (false = not required to activate/open)
  tadtone_shuffle: false                # Tadtones in Flooded Faron Woods shuffled with world items (false = not shuffled)
  gossip_stone_treasure_shuffle: false  # Gossip Stones give random items when raised (false = always visible, no items)
  
  # Rupee Shuffle Difficulty
  # vanilla: Freestanding Rupees will not be randomized
  # beginner: Easy rupee shuffle
  # intermediate: Medium difficulty
  # advanced: All freestanding Rupees can contain any item. Only a few extra Rupee checks are added but these are the most obscure and difficult checks to collect. You have been warned!
  rupee_shuffle: vanilla
  
  # Number of trial treasures to shuffle (0-10)
  # Randomizes treasures in Silent Realms to items. Items other than dusk relics will glow in Silent Realms (Yellow in Faron, Blue in Eldin, Green in Lanayru, and Red on Skyloft).
  trial_treasure_shuffle: 0
  
  # ========================================
  # KEY AND MAP PLACEMENT
  # ========================================
  
  # Small Key Shuffle
  # vanilla: Small Keys will appear in their vanilla locations
  # own_dungeon: Keys only in their own dungeon (default)
  # any_dungeon: Keys can be in any dungeon
  # own_region: Keys will appear in their dungeon's region
  # overworld: Keys will only appear in the overworld
  # anywhere: Keys can be anywhere in the world
  # removed: Keys removed, locks start opened
  small_key_shuffle: own_dungeon
  
  # Boss Key Shuffle
  # vanilla: Boss Keys will appear in their vanilla locations
  # own_dungeon: Boss keys only in their own dungeon (default)
  # any_dungeon: Boss keys can be in any dungeon
  # own_region: Boss Keys appear in their dungeon's region
  # overworld: Boss Keys will only appear in the overworld
  # anywhere: Boss keys can be anywhere in the world
  # removed: Boss Keys removed, boss doors start opened
  boss_key_shuffle: own_dungeon
  
  # Dungeon Map Shuffle
  # vanilla: Maps will appear in their vanilla locations (default)
  # own_dungeon_restricted: Maps will appear inside their respective dungeon, but won't appear on the heart container or dungeon end check.
  # own_dungeon_unrestricted: Maps can appear anywhere inside their respective dungeon
  # any_dungeon: Maps can appear inside any dungeon
  # own_region: Maps will appear in their dungeon's region
  # overworld: Maps will only appear in the overworld
  # anywhere: Maps can appear anywhere
  map_shuffle: vanilla
  
  # ========================================
  # ENTRANCE RANDOMIZATION
  # ========================================
  
  # Randomize only dungeon entrances?
  # false: Entering a dungeon will lead to the vanilla dungeon
  # true: Entering a dungeon will lead to a random dungeon
  randomize_dungeons: false
  
  # Randomize Silent Realm trial entrances?
  # false: Entering a Trial Gate will lead to the vanilla Silent Realm
  # true: Entering a Trial Gate will lead to a random Silent Realm
  randomize_trials: false
  
  # Randomize door entrances (interior and overworld doors)?
  # false: Entering a door will lead to the vanilla exit on the other side
  # true: Entering a door will lead to a random door exit on the other side
  randomize_door_entrances: false
  
  # Decouple left/right double doors?
  # false: Entering a left door will lead to the same location as the corresponding right door
  # true: Entering a left door may lead somewhere different to the corresponding right door (only when Randomize Door Entrances is also enabled)
  decouple_double_doors: false
  
  # Randomize interior building entrances?
  # false: Entering a doorway, pushup door, or loadzone that leads to an interior location will lead to its vanilla location
  # true: Entering a doorway, pushup door, or loadzone that leads to an interior location will lead to a random interior location
  randomize_interior_entrances: false
  
  # Randomize overworld region entrances?
  # false: Entering a doorway, pushup door, or loadzone that leads to an overworld location will lead to its vanilla location
  # true: Entering a doorway, pushup door, or loadzone that leads to an overworld location will lead to a random overworld location
  randomize_overworld_entrances: false
  
  # Decouple forward and return entrances?
  # false: Entering a location and taking the entrance behind you will take you back to where you came from
  # true: Entering a location and taking the entrance behind you will take you to a random location
  decouple_entrances: false
  
  # Randomize Sky Keep room layout?
  # false: The Sky Keep rooms will start in their vanilla positions
  # true: The Sky Keep rooms will start in a random order
  decouple_skykeep_layout: false
  
  # ========================================
  # STARTING INVENTORY
  # ========================================
  
  # Starting Sword
  # no_sword: You will start without a sword
  # practice_sword: You will start with 1 sword upgrade. You will not be able to use the Skyward Strike ability until you find another sword
  # goddess_sword: You will start with 2 sword upgrades. You can use the Skyward Strike ability from the start of the game (default)
  # goddess_longsword: You will start with 3 sword upgrades. Your sword will do more damage from the start of the game
  # goddess_white_sword: You will start with 4 sword upgrades. You will have the completed dowsing wheel from the start of the game
  # master_sword: You will start with 5 sword upgrades. You will deal maximum sword damage from the start of the game
  # true_master_sword: You will start with all 6 sword upgrades. You will stun regular enemies with the sword from the start of the game
  starting_sword: practice_sword
  
  # Number of tablets to start with (0-3)
  # Tablets are randomly selected when count is 1 or 2
  # Count 0 or 3 uses all tablets
  starting_tablets: 0
  
  # Random Starting Bird Statues
  # false: The bird statue unlocked at the start for each surface region will be unchanged
  # true: The bird statue unlocked at the start for each surface region will be randomized. All overworld statues except Inside the Volcano and Inside the Fire Sanctuary may be chosen
  random_starting_statues: false
  
  # Randomize Starting Spawn
  # vanilla: You will start the game in Link's Bedroom
  # anywhere: You will start the game at any valid entrance
  random_starting_spawn: vanilla
  
  # Limit Starting Spawn
  # false: If you spawn in a surface region, you may spawn in any surface province
  # true: If you spawn in a surface region, you may only spawn in a province whose tablet you start with
  limit_starting_spawn: false
  
  # Number of additional items to start with (0-6)
  # The number of randomly chosen items you would like to start with. Only a selection of the most useful items are able to be chosen to maximize the benefit of this setting
  random_starting_item_count: 0
  
  # ========================================
  # CUSTOM STARTING ITEMS
  # ========================================
  # Add any item from the item pool to your starting inventory
  # Format: "Item Name": count
  # Leave empty {} for no custom items
  # See Available_Starting_Items.yaml for all available items
  # 
  # EXAMPLE - to start with a bomb bag and a small quiver:
  #   custom_starting_items:
  #     "Bomb Bag": 1
  #     "Small Quiver": 1
  #
  custom_starting_items: {}
  
  # ========================================
  # TRAP CONFIGURATION
  # ========================================
  
  # Trap Mode
  # no_traps: All items in the game will be genuine (default)
  # trapish: ~10% items are traps
  # trapsome: ~25% items are traps
  # traps_o_plenty: ~50% items are traps
  # traptacular: All of the non-major items will be replaced with 'traps' that don't give the item they appear to be
  trap_mode: no_traps
  
  # Trappable Items
  # major_items: Traps mimic major items (default)
  # non_major_items: Traps only mimic minor items
  # any_items: Traps can mimic any item
  trappable_items: major_items
  
  # ========================================
  # TRAP TYPES (Controlled by the trap_mode setting)
  # ========================================
  # These settings control which trap types can appear in the game.
  
  # Burn Traps - Set you on fire
  # false: Burn traps will not appear
  # true: Burn traps can appear (default)
  burn_traps: true
  
  # Curse Traps - Prevent you from using items
  # false: Curse traps will not appear
  # true: Curse traps can appear (default)
  curse_traps: true
  
  # Noise Traps - Create loud sounds
  # false: Noise traps will not appear
  # true: Noise traps can appear (default)
  noise_traps: true
  
  # Groose Traps - Spawn Groose the GOAT
  # false: Groose traps will not appear (default)
  # true: Groose traps can appear
  groose_traps: false
  
  # Health Traps - Reduce your health
  # false: Health traps will not appear (default)
  # true: Health traps can appear
  health_traps: false

  # ========================================
  # QUALITY OF LIFE SETTINGS
  # ========================================
  
  # Thunderhead
  # false: Thunderhead starts closed (default)
  # true: The Thunderhead is open from the start
  open_thunderhead: false
  
  # Lake Floria Gate
  # vanilla: You are expected to climb the Great Tree, talk to Yerbal, and open the Lake Floria Gates with the Goddess Sword in order to enter Lake Floria
  # yerbal: You are expected to climb the Great Tree and talk to Yerbal in order to enter Lake Floria
  # open: The Lake Floria Gates will be opened from the start of the game (default)
  open_lake_floria: open
  
  # Earth Temple
  # open: The Earth Temple Door will be opened from the start of the game (default)
  # shuffle_eldin: You will need to collect all the Earth Temple Key Pieces, shuffled within the Eldin Volcano region (including Mogma Turf if overworld entrances are not randomized), in order to open the Earth Temple Door
  # shuffle_anywhere: You will need to collect all the Earth Temple Key Pieces, shuffled anywhere, in order to open the Earth Temple Door
  open_earth_temple: false
  
  # Lanayru Mining Facility
  # nodes: You will need to activate each of the 3 nodes and the main node in order to raise the Lanayru Mining Facility
  # main_node: You will need to activate the main node in order to raise the Lanayru Mining Facility
  # open: The Lanayru Mining Facility will be raised from the start of the game (default)
  open_lmf: open
  
  # Batreaux Shed
  # false: Batreaux Shed starts closed (default)
  # true: Batreaux's Shed is open from the start
  open_batreaux_shed: false
  
  # Skip Harp Playing
  # false: Opening up Trial Gates and receiving items from The Old One will require strumming the harp (default)
  # true: Trial Gates will automatically open up when you have obtained the harp and the appropriate song. Additionally, The Old One will not require you to play the harp to receive their item
  skip_harp_playing: false
  
  # Skip Miscellaneous Small Cutscenes
  # false: Misc cutscenes will play normally (default)
  # true: Various small miscellaneous cutscenes will be skipped
  skip_misc_cutscenes: false
  
  # ========================================
  # DIFFICULTY SETTINGS
  # ========================================
  
  # Damage Multiplier
  # invincible: No damage taken (invincible)
  # half: 50% damage taken
  # normal: 100% damage taken (default)
  # double: 200% damage taken
  # quadruple: 400% damage taken
  # ohko: One-hit knockout
  damage_multiplier: normal
  
  # No Spoiler Log
  # false: Spoiler log will be generated (default)
  # true: No spoiler log will be generated
  no_spoiler_log: false
  
  # ========================================
  # MUSIC AND COSMETICS
  # ========================================
  
  # Music Randomization
  # vanilla: No music shuffle (default)
  # shuffled: Background music randomly shuffled
  # shuffled_limit_vanilla: Minimize unchanged tracks
  music_randomization: vanilla
  
  # Cutoff Game Over Music
  # false: Game over music will play normally (default)
  # true: If music is randomized, very long songs will not play from game-over screen
  cutoff_game_over_music: false
  
  # ========================================
  # ADVANCED RANDOMIZATION OPTIONS
  # ========================================
  
  # Enable Back in Time (BiT) Glitch
  # false: You will not be able to perform the Back in Time (BiT) glitch from the Wii version of the game (default)
  # true: You will be able to activate the Back in Time (BiT) glitch by soft-resetting the game (hold R+A+LeftStick) while also holding the L button
  enable_back_in_time: false
  
  # Underground Rupee Shuffle
  # false: Underground Rupee locations will not be randomized (default)
  # true: Underground Rupee locations that require burrowing into digspots with the Mogma Mitts can contain any item
  underground_rupee_shuffle: false
  
  # Beedle's Airshop Shuffle
  # vanilla: Beedle's Airshop will contain its vanilla items
  # junk_only: Beedle's Airshop will only contain junk items
  # randomized: Beedle's Airshop can contain any items (default)
  beedle_shop_shuffle: randomized
  
  # Random Bottle Contents
  # false: There will be 3 Empty Bottles, 1 Revitalizing Potion, and 1 Bottle of Mushroom Spores in the item pool (default)
  # true: There will be 5 Bottles in the item pool - each with random contents (e.g. Heart Potion, Hot Pumpkin Soup, Sacred Water, etc...)
  random_bottle_contents: false
  
  # Randomize Shop Prices
  # false: All shop prices will be unchanged from the vanilla game (default)
  # true: All shop prices will be randomized without changing how many wallets are needed to obtain each check
  randomize_shop_prices: false
  
  # Ammo Availability
  # scarce: Only from drops and Gear shop
  # vanilla: Appear when breaking pots (default)
  # useful: Added in key places to reduce backtracking
  # plentiful: Added next to all Bird Statues
  ammo_availability: plentiful
  
  # Boss Key Puzzles
  # correct_orientation: Keys fit immediately
  # vanilla_orientation: Original orientation (default)
  # random_orientation: Random orientation
  boss_key_puzzles: vanilla_orientation
  
  # Minigame Difficulty
  # easy: Easy minigames (default)
  # medium: Medium difficulty
  # hard: Challenging minigames
  minigame_difficulty: easy
  
  # ========================================
  # ADVANCED GAME OPTIONS
  # ========================================
  
  # Chest Type Matches Contents
  # off: Each chest will have the same type as it would in the vanilla game
  # only_dungeon_items: Special chests only for dungeon items
  # all_contents: Each chest will have a different type based on the item inside. Important items will appear in big blue chests. Boss Keys will appear in fancy chests. Other items will appear in brown, wooden chests (default)
  chest_type_matches_contents: all_contents
  
  # Small Keys in Fancy Chests
  # false: When Chest Type Matches Contents is not off, Small Keys will appear in big blue chests (default)
  # true: When Chest Type Matches Contents is not off, Small Keys will appear in fancy chests
  small_keys_in_fancy_chests: false
  
  # Full Wallet Upgrades
  # false: Newly obtained wallets do not give any Rupees (default)
  # true: Newly obtained wallets will come pre-filled with Rupees
  full_wallet_upgrades: false
  
  # Random Trial Object Positions
  # false: Trial objects appear in their vanilla locations (default)
  # true: The positions of tears, light fruits, dusk relics, and stamina fruits will be shuffled amongst each other
  random_trial_object_positions: false
  
  # Upgraded Skyward Strike
  # false: Only the True Master Sword will have the fully upgraded Skyward Strike.
  # true: The Goddess Sword (and better swords) will have the fully upgraded Skyward Strike (charges quicker and travels farther) (default)
  upgraded_skyward_strike: true
  
  # Faster Air Meter Depletion
  # false: Air meter depletes at normal speed (default)
  # true: The air meter depletes at twice the normal rate when swimming like in Hero Mode
  faster_air_meter_depletion: false
  
  # Unlock All Groosenator Destinations
  # false: Groosenator destinations unlock normally (default)
  # true: All Groosenator destinations are unlocked from the start
  unlock_all_groosenator_destinations: false
  
  # Allow Flying at Night
  # false: You will not be able to fly at night (default). If Require Natural Night Connections is disabled, night flying will be enabled to facilitate this
  # true: You will be able to call your loftwing and fly in The Sky at night
  allow_flying_at_night: false
  
  # Require Natural Night Connections
  # false: You may be required to sleep to night and travel anywhere in the world to access nighttime-only checks, including flying at night
  # true: You will not be required to sleep to night and travel to the overworld to access nighttime-only checks (default)
  natural_night_connections: true
  
  # Peatrice Conversations
  # How many times you need to talk to Peatrice before she calls you "darling" and you can start Peater's quest (0-6)
  peatrice_conversations: 0
  
  # ========================================
  # DUNGEON SETTINGS
  # ========================================
  
  # Include Sky Keep as a Required Dungeon Option
  # false: Only the 6 main dungeons may be selected as required dungeons (default)
  # true: Sky Keep may be selected as a required dungeon needed to beat the seed. If selected, one of the "Sacred Power" locations will be chosen as the "Goal Location" containing an important item (shown on a stone tablet in the 1st room of Sky Keep)
  dungeons_include_sky_keep: false
  
  # Barren Unrequired Dungeons
  # false: Unrequired dungeons may contain items needed to beat the game
  # true: Unrequired dungeons will be barren (default)
  empty_unrequired_dungeons: true
  
  # Lanayru Caves Small Keys
  # vanilla: The Lanayru Caves Keys will appear in their vanilla location
  # removed: The Lanayru Caves Keys will not appear anywhere in the world and the locks will start opened (default)
  lanayru_caves_keys: removed

  # ========================================
  # QUALITY OF LIFE SHORTCUTS
  # ========================================
  
  # Isle of Songs Bridge Complete
  # false: You will need to solve the bridge puzzle in order to enter inside of the Isle of Songs
  # true: The bridge puzzle will be solved from the start of the game
  shortcut_ios_bridge_complete: false
  
  # Sealed Spiral Log to Behind the Temple
  # false: You will not be able to go through the entrance from the Sealed Grounds Spiral to Behind the Temple without entering from the other side where you can push down the log
  # true: The log between the Sealed Grounds Spiral and Behind the Temple will be pushed down from the start of the game
  shortcut_spiral_log_to_btt: false
  
  # Faron Woods Logs near Entry Bird Statue
  # false: You will need a Sword or Clawshots to get to the main part of Faron Woods
