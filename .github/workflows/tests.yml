name: Tests and Checks

on:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pylint
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    
    - name: Lint with flake8
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats all errors as warnings
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      continue-on-error: true

  structure-check:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Check required files
      run: |
        echo "Checking for required files..."
        
        required_files=(
          "__init__.py"
          "Items.py"
          "Locations.py"
          "Regions.py"
          "Rules.py"
          "Options.py"
          "SSHDClient.py"
          "archipelago.json"
          "requirements.txt"
          "README.md"
        )
        
        missing=0
        for file in "${required_files[@]}"; do
          if [ ! -f "$file" ]; then
            echo "❌ Missing: $file"
            missing=1
          else
            echo "✅ Found: $file"
          fi
        done
        
        if [ $missing -eq 1 ]; then
          exit 1
        fi
    
    - name: Validate archipelago.json
      run: |
        python -c "
        import json
        import sys
        
        try:
            with open('archipelago.json', 'r') as f:
                data = json.load(f)
            
            required_keys = ['game', 'item_name_groups', 'location_name_groups']
            missing = [k for k in required_keys if k not in data]
            
            if missing:
                print(f'❌ Missing required keys in archipelago.json: {missing}')
                sys.exit(1)
            
            print('✅ archipelago.json is valid')
            print(f'   Game: {data[\"game\"]}')
            print(f'   Item groups: {len(data[\"item_name_groups\"])}')
            print(f'   Location groups: {len(data[\"location_name_groups\"])}')
            
        except json.JSONDecodeError as e:
            print(f'❌ Invalid JSON in archipelago.json: {e}')
            sys.exit(1)
        except Exception as e:
            print(f'❌ Error validating archipelago.json: {e}')
            sys.exit(1)
        "
    
    - name: Check Python imports
      run: |
        python -c "
        import sys
        
        try:
            # Try importing key modules
            print('Testing imports...')
            
            # These should import without errors
            import Items
            import Locations
            import Regions
            import Rules
            import Options
            
            print('✅ All core modules import successfully')
            
        except ImportError as e:
            print(f'❌ Import error: {e}')
            sys.exit(1)
        except Exception as e:
            print(f'❌ Unexpected error: {e}')
            sys.exit(1)
        "

  compatibility-check:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.10', '3.11', '3.12']
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Test build on ${{ matrix.os }}
      run: |
        python build_apworld.py
    
    - name: Verify APWorld
      shell: bash
      run: |
        if [ ! -f "sshd.apworld" ]; then
          echo "❌ sshd.apworld not created"
          exit 1
        fi
        
        size=$(stat -c%s "sshd.apworld" 2>/dev/null || stat -f%z "sshd.apworld")
        echo "✅ APWorld created successfully (${size} bytes)"
        
        # Verify it's a valid ZIP
        python -m zipfile -l sshd.apworld > /dev/null
        echo "✅ APWorld is a valid ZIP file"
